- name: Build dynamic target host from Terraform output
  hosts: localhost
  gather_facts: false
  vars:
    resolved_public_ip: "{{ (target_public_ip | default(terraform_public_ip | default(ecs_public_ip | default('')))) | trim }}"

  tasks:
    - name: Validate target public IP for dynamic inventory
      ansible.builtin.assert:
        that:
          - resolved_public_ip | length > 0
        fail_msg: >-
          target_public_ip is required (or provide terraform_public_ip/ecs_public_ip)

    - name: Add dynamic host to runtime group
      ansible.builtin.add_host:
        name: "dynamic-{{ resolved_public_ip }}"
        groups: terraform_targets
        ansible_host: "{{ resolved_public_ip }}"
        ansible_user: "{{ ssh_user | default(omit) }}"
        ansible_port: "{{ ssh_port | default(omit) }}"
        ansible_ssh_common_args: "{{ ssh_common_args | default('-o StrictHostKeyChecking=no') }}"

- name: Configure Frappe site
  hosts: terraform_targets
  gather_facts: false
  vars:
    bench_path: /home/techmaju/frappe-bench
    sql_password_file: /home/techmaju/.sqlpasswrd
    admin_password_file: /home/techmaju/.adminpasswrd
    app_name: techmaju_core
    run_certbot: "{{ enable_certbot | default(not (safeline_enabled | default(false) | bool)) | bool }}"

  pre_tasks:
    - name: Normalize input variables for AWX and CLI
      ansible.builtin.set_fact:
        site_name: "{{ (SITE_NAME | default(site_name | default(''))) | trim }}"
        email_address: "{{ (EMAIL_ADDRESS | default(email_address | default(''))) | trim }}"

    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - site_name | length > 0
        fail_msg: "site_name (or SITE_NAME) is required and must not be empty"

    - name: Validate email when SSL step is enabled
      ansible.builtin.assert:
        that:
          - email_address | length > 0
        fail_msg: "email_address (or EMAIL_ADDRESS) is required when Certbot is enabled"
      when: run_certbot

    - name: Check SQL root password file
      ansible.builtin.stat:
        path: "{{ sql_password_file }}"
      register: sqlpasswdfile

    - name: Fail when SQL root password file is missing
      ansible.builtin.fail:
        msg: "SQL root password file {{ sql_password_file }} was not found"
      when: not sqlpasswdfile.stat.exists

    - name: Detect bench executable path
      ansible.builtin.command: bash -lc "command -v bench"
      register: bench_detect
      changed_when: false
      become: true
      become_user: techmaju

    - name: Register bench executable
      ansible.builtin.set_fact:
        bench_cmd: "{{ bench_detect.stdout | trim }}"

  tasks:
    - name: Check whether site already exists
      ansible.builtin.stat:
        path: "{{ bench_path }}/sites/{{ site_name }}/site_config.json"
      register: site_config
      become: true
      become_user: techmaju

    - name: Read SQL root password
      ansible.builtin.slurp:
        src: "{{ sql_password_file }}"
      register: sqlpasswd
      no_log: true

    - name: Register SQL root password
      ansible.builtin.set_fact:
        sql_root_password: "{{ sqlpasswd.content | b64decode | trim }}"
      no_log: true

    - name: Create site when missing
      become: true
      become_user: techmaju
      block:
        - name: Generate admin password
          ansible.builtin.set_fact:
            admin_password: "{{ lookup('ansible.builtin.password', '/dev/null', length=20, chars=['ascii_letters', 'digits']) }}"
            cacheable: true
          no_log: true

        - name: Store admin password on target host
          ansible.builtin.copy:
            dest: "{{ admin_password_file }}"
            content: "{{ admin_password }}\n"
            owner: techmaju
            group: techmaju
            mode: "0600"
            force: false
          no_log: true

        - name: Create Frappe site
          ansible.builtin.command:
            chdir: "{{ bench_path }}"
            cmd: >-
              {{ bench_cmd }} new-site {{ site_name }}
              --db-root-username root
              --db-root-password {{ sql_root_password }}
              --admin-password {{ admin_password }}
      when: not site_config.stat.exists
      no_log: true

    - name: Enable scheduler
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} --site {{ site_name }} scheduler enable"
      become: true
      become_user: techmaju

    - name: Resume scheduler
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} --site {{ site_name }} scheduler resume"
      become: true
      become_user: techmaju

    - name: Read installed apps
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} --site {{ site_name }} list-apps"
      register: installed_apps
      changed_when: false
      become: true
      become_user: techmaju

    - name: Install app when not installed
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} --site {{ site_name }} install-app {{ app_name }}"
      when: app_name not in installed_apps.stdout_lines
      become: true
      become_user: techmaju

    - name: Set developer mode off
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} --site {{ site_name }} set-config developer_mode 0"
      become: true
      become_user: techmaju

    - name: Clear cache
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} --site {{ site_name }} clear-cache"
      become: true
      become_user: techmaju

    - name: Setup nginx config
      ansible.builtin.shell:
        chdir: "{{ bench_path }}"
        cmd: "yes | {{ bench_cmd }} setup nginx"
      args:
        executable: /bin/bash
      become: true
      become_user: techmaju

    - name: Pause before requesting certificate
      ansible.builtin.pause:
        minutes: 5
      when: run_certbot

    - name: Activate SSL certificate via Certbot
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: >-
          certbot --nginx --non-interactive --agree-tos
          --email {{ email_address }}
          -d {{ site_name }}
      become: true
      become_user: root
      when: run_certbot

    - name: Restart bench services
      ansible.builtin.command:
        chdir: "{{ bench_path }}"
        cmd: "{{ bench_cmd }} restart"
      become: true
      become_user: techmaju
